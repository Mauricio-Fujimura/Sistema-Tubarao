<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Tubarão</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="fototubarao">
      <img src="fototubarao.png" alt="logo do tubarão" id="logo" />
    </div>

    <div id="menu">
      <button
        class="botoesprincipais"
        id="botaovender"
        class="botao"
        onclick="mostrar('vendas')"
      >
        Vender
      </button>
      <button
        class="botoesprincipais"
        id="botaoestoque"
        class="botao"
        onclick="mostrar('estoque')"
      >
        Estoque
      </button>
      <button
        class="botoesprincipais"
        id="botaohistorico"
        class="botao"
        onclick="mostrar('historico')"
      >
        Historico Vendas
      </button>
      <button
        class="botoesprincipais"
        id="botaocaixa"
        class="botao"
        onclick="mostrar('caixa')"
      >
        Caixa
      </button>
    </div>
    <div id="textocentro">
      <h1>Menu Tubarão</h1>
    </div>

    <div id="conteudo">
      <div id="vendas" class="secao">
        <div class="textosecao">
          <h2>Vendas</h2>
        </div>

        <div class="centralizador">
          <div id="caixasecao">
            <ul id="carrinho" class="listadados">
              <li class="produtocarrinho">
                <span>nome</span>
                <span>quantidade</span>
                <span>preco</span>
                <button class="editarproduto">Editar</button>
              </li>
            </ul>
          </div>
        </div>

        <div id="infosecao">
          <input
            type="text"
            id="referenciaproduto"
            placeholder="Digite o nome ou refencia do produto"
          />

          <p id="totalvendas">Total</p>
          <span id="precototalvenda">R$0.00</span>

          <button id="encerrarvenda">Encerrar Venda</button>
        </div>
      </div>

      <div id="estoque" class="secao">
        <div class="textosecao">
          <h2>Estoque</h2>
        </div>
        <div class="centralizador">
          <div id="caixasecao">
            <ul id="listaestoque" class="listadados">
              <li id="produtosestoque">
                <span>nome</span>
                <span>preco</span>
                <span>quantidade</span>
                <span>Id</span>
                <button class="editarproduto">Editar</button>
              </li>
            </ul>
          </div>
        </div>

        <div id="infoestoque">
          <input
            id="pesquisaproduto"
            type="text"
            placeholder="Pesquisar produto"
          />
          <button
            id="botaoaddestoque"
            onclick="mostramodal('adicionarproduto')"
          >
            Adicionar Produto
          </button>
        </div>

        <div id="adicionarproduto" class="modal">
          <div class="caixamodal">
            <form id="itensaddestoque">
              <input
                id="nomeproduto"
                type="text"
                placeholder="Nome do Produto"
                class="inputmodal"
              />
              <input
                id="quantidadeproduto"
                type="text"
                placeholder="Quantidade do produto"
                class="inputmodal"
              />
              <input
                id="addprecoproduto"
                type="text"
                placeholder="Preço do produto"
                class="inputmodal"
              />
              <input
                class="inputmodal"
                id="addidproduto"
                type="text"
                placeholder="Id produto (opcional)"
              />
              <button type="submit">Adicionar produto</button>
            </form>
          </div>
        </div>
      </div>

      <div id="historico" class="secao">
        <div class="textosecao">
          <h2>Historico Vendas</h2>
        </div>
        <div class="centralizador">
          <div id="caixasecao">
            <ul id="listahistorico" class="listadados">
              <li id="historicododia">
                <span>Nenhuma venda realizada</span>
                <button class="editarhistorico">Editar Historico</button>
              </li>
            </ul>
          </div>
        </div>
        <div class="organizainfo">
          <div id="infohistorico">
            <input
              id="pesquisahistorico"
              type="text"
              placeholder="Pesquisar dia"
            />
            <button id="pesquisarhistorico">Pesquisar</button>
          </div>
          <button
            id="pesquisaroutrodia"
            onclick="mostarmodal('janelahistoricos')"
          >
            Pesquisar outro dia
          </button>
        </div>

        <div id="janelahistoricos" class="modal">
          <div class="caixamodal">
            <form class="organizapesquisa">
              <label for="pesquisadehistorico">Pesquisar dia</label>
              <input
                id="pesquisadehistorico"
                type="text"
                placeholder="Digite o dia do historico"
              />
              <button type="submit" id="confirmarpesquisa">Pesquisar</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
